version: 0.4.0
title: Regime extension + dynamic sizing — Sharpe-vs-profit Pareto frontier mapped
date_started: 2026-05-07
date_completed: 2026-05-07
branch: autoresearch/may7
git_tag: v0.4.0
peak_commit: 011eb08  # round 20 final state — agent self-stopped at "Pareto end"
real_peak_commit: d86392f  # round 11 — Sharpe 1.122 / +232% profit, the "real" peak before Pareto walk

intervention:
  summary: |
    Two structural changes bundled into v0.4.0:
    (1) Timerange extended from 2023-2025 (bull only) to 2021-2025 (includes
        2022 winter — BTC -75% peak-to-trough). Directly addresses v0.3.0
        retrospective's blocking finding "cross-pair macro gates redundant in
        single-regime bull market".
    (2) Dynamic position sizing affordance via FreqTrade's custom_stake_amount
        method, documented in the template. Optional — strategies that don't
        need sizing logic can use default equal-weight.
  vs_v0_3_0: |
    v0.3.0 hit clean Sharpe 1.07 on 3-year pure-bull data with cross-pair
    breakout (BTCLeaderBreakX). Its retrospective explicitly flagged
    "no bear-regime validation" and "cross-pair macro gates blocked by
    single-regime data" as the binding limitations. v0.4.0 lifts the regime
    constraint and adds sizing as orthogonal risk-control affordance.

asset:
  pairs: [BTC/USDT, ETH/USDT, SOL/USDT, BNB/USDT, AVAX/USDT]
  timeframes_base: 1h
  timeframes_informative: [4h, 1d]
  timerange: 20210101-20251231
  exchange: binance
  regimes_covered: [2021_bull, 2022_winter, 2023_2025_recovery]

experiments:
  rounds: 20  # agent self-stopped at r20 (declared Pareto-end)
  total_events: 60
  events_by_type:
    create: 6
    evolve: 29
    fork: 1
    kill: 1  # only ONE explicit kill row; multiple strategies were killed
             # via the agent's "implicit kill via subsequent create note" pattern
             # (a deviation from v0.2.0/v0.3.0 protocol — see bookkeeping note below)
    stable: 23
  strategies_ever_created: 6  # MeanRevRSIDip, ChannelADXTrend, VolBreakoutSized
                              # + CrossPairMR, BTCLeaderBreakV4, MomentumMTFConfluence
                              # + 1 fork (VolBreakoutEqual)
  strategies_killed_actually: 4  # MeanRevRSIDip r5, CrossPairMR r7,
                                 # ChannelADXTrend r8, VolBreakoutEqual r10
  strategies_alive_at_end: 3
  paradigms_tested: 5  # mean-rev (2 implementations), trend, breakout
                       # (per-pair + cross-pair), momentum
  paradigms_with_positive_edge: 3  # breakout (per-pair), breakout (cross-pair),
                                   # momentum (capped)
  paradigms_killed: 2  # mean-rev (declared exhausted r6), trend (low-ceiling r8)

# IMPORTANT: v0.4.0 has TWO meaningful Sharpe peaks. Reading just one is misleading.
peaks:
  real_peak:  # the actual edge of the strategy at real-world position size
    commit: d86392f
    round: 11
    strategy: VolBreakoutSized
    sharpe: 1.1219
    profit_pct: 232.0
    max_dd_pct: -19.9
    sortino: 4.79
    calmar: 12.3
    note: |
      This is the "real" v0.4.0 peak — the strategy's edge at meaningful
      portfolio exposure. Sharpe 1.12 on 5-year regime-mixed data including
      2022 winter, profit +232% (~46%/year), DD -20%. Strictly stronger than
      v0.3.0's 1.07 on bull-only data.
  pareto_end_peak:  # what agent reported as final, after walking the Pareto frontier
    commit: 011eb08
    round: 20
    strategy: VolBreakoutSized
    sharpe: 1.3390
    profit_pct: 25.0
    max_dd_pct: -4.3
    note: |
      Agent walked the Sharpe-vs-profit Pareto frontier by sequentially
      tightening vol_target (0.025 → 0.020 → 0.015 → 0.010 → 0.005 → 0.003).
      Sharpe climbed monotonically from 1.12 to 1.34 while profit collapsed
      from +232% to +25% (~10× reduction). At the endpoint, profit is in
      "barely-trades" / "Sharpe-via-tiny-stakes" territory. Agent self-flagged
      "degenerate territory" and stopped: "gains are now noise. Run stops here
      for retrospective review." Strictly clean (no Goodhart in the v0.1.0
      sense), but illustrates that Sharpe-as-single-oracle has a degeneracy
      boundary at vol_target → 0.

final_portfolio:
  - name: VolBreakoutSized
    paradigm: per-pair-breakout
    sharpe_at_run_end: 1.3390  # Pareto-end (vol_target=0.003)
    sharpe_real_peak: 1.1219   # at vol_target=0.025, the meaningful peak
    max_dd_pct_real_peak: -19.9
    profit_pct_real_peak: 232.0
    status: alive, LEADER
    key_structure: |
      Per-pair Donchian-24 break + 4h EMA50>EMA200 regime + local volume 1.3x
      + SMA50 patient exit + vol-target sizing. v0.4.0 finding: per-pair
      Donchian (this strategy, 1.12) is MORE regime-robust than cross-pair
      Donchian (BTCLeaderBreakV4, 0.79) — flips v0.3.0's relative ordering.
  - name: BTCLeaderBreakV4
    paradigm: cross-pair-breakout
    sharpe_at_run_end: 0.94
    sharpe_real_peak: 0.79  # at vol_target=0.025, before Pareto walk
    max_dd_pct_real_peak: -12.8
    profit_pct_real_peak: 170.0
    status: alive
    key_structure: |
      v0.3.0's BTCLeaderBreakX recipe (BTC 4h Donchian-10 trigger) on regime-
      mixed data. Sharpe drops ~45% from v0.3.0 (1.07 → 0.59 baseline; 0.79
      after exit-tuning improvements). Confirms the v0.3.0 cross-pair finding
      was partly bull-regime-conditional.
  - name: MomentumMTFConfluence
    paradigm: momentum
    sharpe: 0.3993
    profit_pct: 53.0
    max_dd_pct: -23.18
    status: alive, paradigm-cap-confirmed
    key_structure: |
      1d SMA50 regime + 4h MACD bullish + 1h EMA20 cross-up entry, equal-weight.
      Sharpe 0.40 — matches v0.3.0 MACDMomentumMTF (0.41) almost exactly on
      completely different timerange. **Cross-version paradigm-cap confirmation**:
      momentum has structural ~0.4 Sharpe ceiling on this universe, independent
      of regime. Filed as paradigm-level finding, not tuning artifact.

