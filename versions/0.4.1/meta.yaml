aha_moments:
  - round: 9
    type: r0_baseline_already_on_pareto_frontier
    commit: 021e120
    summary: |
      Single sizing ablation lifted r0 BNBMeanRevertSharp (robust 0.0789) →
      BNBSizedConviction (robust 0.0980). Identical 115 trades, identical
      WR 69.6%, only difference: RSI-depth conviction sizing. **The r9
      output became the v0.4.1 robust_sharpe ceiling for the entire run** —
      the next 20 rounds of evolution + creation never produced a strictly
      better-dominating strategy. Establishes the "early Pareto frontier
      lock" pattern: a paradigm + a single sizing ablation can saturate
      the local optimum before complexity arrives.
  - round: 14
    type: second_gold_filter_named
    commit: 3d9b9b0
    summary: |
      PerPairMR alts-branch added 4h ema50>ema200 trend gate. winter
      -0.11 → +0.05 (positive flip), recovery -0.10 → +0.11 (positive
      flip), full_5y 0.14 → 0.30 (doubled). Agent: "4h trend gate is the
      second gold finding (volume filter was first)." Both gold filters
      now have explicit attribution: volume (v0.2.0) for capitulation /
      MR family; 4h trend (v0.4.1) for cross-paradigm regime gating.
  - round: 16
    type: conviction_sizing_paradigm_agnostic
    commit: 407b700
    summary: |
      CrashRebound +DD-depth conviction sizing (scale=clamp(|dd|/0.20,0.5,2.0)):
      robust 0.062 → 0.085 (+37%). Mechanism mirrors r9's RSI-depth sizing
      on BNB-MR. Two independent paradigms (drawdown-rebound + RSI-MR), two
      different signal sources (DD magnitude + RSI level), same effect:
      same trades, redistributed profit toward deeper-conviction regimes.
      **NEW finding: conviction-style sizing (scale by signal depth) is
      paradigm-agnostic.** Refines v0.4.0's "sizing is risk-control not edge"
      — sizing isn't edge, but conviction-style sizing IS a paradigm-agnostic
      profit-redistribution mechanism.
  - round: 18
    type: paradigm_conditional_strategy_emerges
    commit: e30aaff
    summary: |
      PerPairMR added BTC+ETH Donchian-48 breakout branch on top of existing
      BNB→RSI-MR + SOL+AVAX→BB-MR. **First multi-paradigm-per-pair strategy
      in the project** — same .py file expresses three different paradigms
      depending on which pair the entry signal comes from. Pareto-improvement:
      full_5y 0.30 → 0.35, robust held 0.052. Trade count 387 → 519. This
      strategy form is enabled specifically by the v0.4.1 pair_basket
      affordance + per-pair conditional logic in entry signals. Architecturally
      novel structure that earlier versions could not express.
  - round: 24
    type: filter_paradigm_specificity
    commit: ae03008
    summary: |
      MomentumGoldFilters dropped volume filter: bull sharpe 0.05 → 0.46
      (~9× lift). v0.2.0 had named volume filter as "first universal gold
      filter". v0.4.1 evidence: volume filter HURTS continuation/momentum
      paradigms (continuations don't spike volume on entry) and HELPS
      capitulation/MR paradigms (capitulations DO spike volume).
      **Narrows v0.2.0 finding from universal to paradigm-specific.**
      Third cross-paradigm transferability rule (alongside conviction sizing
      = transfers, patient exit = breakout-only).
  - round: 26
    type: sizing_composition_rule
    commit: f53740b
    summary: |
      RegimeAdaptiveBNB composed regime-detection sizing × RSI-depth sizing
      multiplicatively. Recovery 0.075 → 0.097, robust 0.097 (Pareto-equal
      to BNBSized r9). **NEW rule: sizing mechanisms compose multiplicatively
      when their underlying signals are independent.** First explicit
      composition observed in the project; opens path to multi-mechanism
      ensemble sizing.
  - round: 28
    type: composition_failure_mode_explained
    commit: f903ae2
    summary: |
      CrashRebound attempted same composition (DD-conviction × regime sizing):
      robust 0.085 → -0.083 (catastrophic crash). Agent diagnosed:
      "regime and DD-signal are NEGATIVELY correlated (bull=small DDs=signal
      weak; winter=big DDs=signal strong). Composition INVERSE-amplifies."
      **Refines composition rule: only safe when underlying signals are
      independent OR positively correlated; negatively correlated signals
      cause inverse-amplification.** Most precise sizing rule produced
      across all five versions to date.
  - round: 27
    type: third_instance_pareto_walks_meta
    commit: 2890675
    summary: |
      RegimeAdaptiveBNB pushed regime sizing 1.5x/0.5x → 2.0x/0.25x:
      robust 0.097 → 0.089, avg_position 31% → 40%. Pareto MOVE not
      improvement. **Third independent instance of "single-knob sizing
      walks produce Pareto move not Pareto improvement"** (BNBSized r17
      linear formula, v0.4.0 r17-r20 vol-target ladder, RegimeAdaptive r27
      regime multiplier). Three datapoints across two versions = stable
      meta-finding.
  - round: 29
    type: agent_self_converged_voluntary_finalize
    commit: ebe3254
    summary: |
      All 3 strategies (CrashRebound, PerPairMR, RegimeAdaptiveBNB) marked
      "FINAL" in r29 notes — agent voluntarily declared the run converged
      with all three at proven baselines (post-revert from r28's failed
      composition experiment). **First time the project ended with explicit
      multi-strategy convergence statement.** Different from v0.4.0's
      "Pareto-end stop" (one strategy degenerating into noise) — here the
      agent recognized that 3-strategy lineup had reached a stable joint
      optimum and stopped without metric saturation.

comparative_findings:
  # Findings that are NEW in v0.4.1 (not previously in any version's retrospective)
  new_findings:
    - title: Conviction-style sizing transfers paradigm-agnostically
      detail: |
        Two independent demonstrations: RSI-depth on BNB-MR (r9, +24%
        robust) and DD-depth on drawdown-rebound (r16, +37% robust).
        Same mechanism — scale stake by inverse of signal-depth — works
        across mean-reversion AND counter-trend MR. Sizing isn't edge
        (v0.4.0 finding) but **conviction-style sizing IS a paradigm-
        agnostic redistribution mechanism**. Refines, doesn't contradict,
        v0.4.0 finding 1.
    - title: Sizing-composition rule (multiplicative when signals independent)
      detail: |
        RegimeAdaptiveBNB r26 composed regime × RSI sizing successfully
        (independent signals: regime ⊥ within-regime RSI). CrashRebound
        r28 composed DD × regime catastrophically (regime correlated with
        DD-magnitude → inverse-amplification). New rule: composition
        only safe when sizing signals are mutually independent or
        positively correlated.
    - title: Signal-driven sizing > regime-driven sizing for MR (then composed = best)
      detail: |
        RegimeAdaptive r25 with regime-only sizing: bull/winter sharpe at
        per-strategy historic high (0.358/0.236) but recovery 0.075 (low) —
        regime classification can't distinguish within-recovery pullbacks
        from neutral periods. RSI-depth sizing (BNBSized r9) does. r26
        composed both = simultaneously highest bull/winter AND lifted
        recovery. Implies: signal-driven sizing has higher resolution
        than regime-driven for paradigms with within-regime structure;
        regime-driven adds orthogonal context when signals are independent.
    - title: First paradigm-conditional strategy form
      detail: |
        PerPairMR (final): BNB→RSI MR / SOL+AVAX→BB MR / BTC+ETH→Donchian
        breakout. Same .py file, three paradigms routed by pair. Enabled
        specifically by v0.4.1's pair_basket affordance + per-pair
        conditional entry signals. Architecturally novel — earlier versions
        forced one paradigm per file. Pareto-improvement: full_5y +35.8%
        across 519 trades on a 5-pair basket while holding robust 0.052.
    - title: 4h trend gate as second gold filter (paradigm-agnostic)
      detail: |
        PerPairMR r14 alts-branch: 4h ema50>ema200 gate flipped winter and
        recovery from negative to positive (winter -0.11→+0.05,
        recovery -0.10→+0.11). Agent named "second gold finding (volume
        was first)". Distinct from volume filter — works for momentum,
        counter-trend, and breakout paradigms tested in v0.4.1.

  # Cross-version REINFORCEMENTS — v0.4.1 confirms or extends prior findings
  cross_version_reinforcements:
    - title: Cross-pair-MR has structural paradigm cap (v0.4.0 + v0.4.1, two failures)
      detail: |
        v0.4.0 CrossPairMR (alt/BTC ratio MR) declared exhausted r7.
        v0.4.1 CrossPairRatio (BTC/ETH ratio z-score MR) declared exhausted
        r23 after 1 round. Different ratios, different timeranges, same
        result: ratio MR has structural exposure to multi-month decoupling
        phases that no within-strategy patch resolves. Two independent
        failures = paradigm cap, not version-specific issue.
    - title: Cross-pair-leader breakout paradigm cap under robust_sharpe
      detail: |
        v0.3.0 BTCLeaderBreakX 1.07 (single bull regime) → v0.4.0
        BTCLeaderBreakV4 0.79 baseline (single 5-yr regime mix, one timerange)
        → v0.4.1 MajorsBTCLeader robust -0.17 (4 timerange honesty bar).
        **The v0.3.0 1.07 hero collapses progressively as the oracle gets
        harder.** v0.4.0 retro flagged "BTC-leader signals concentrate
        portfolio DD during leadership cycles" — v0.4.1 confirms by failing
        winter sharpe specifically. Cross-version DD-concentration finding
        upgraded to "this paradigm cannot survive multi-timerange honesty bar".
    - title: Momentum 0.40 cap is INTRINSIC even with optimal filter stack
      detail: |
        v0.3.0 MACDMomentumMTF 0.41, v0.4.0 MomentumMTFConfluence 0.40,
        v0.4.1 MomentumGoldFilters 0.21 with ALL gold filters stacked
        (slope-up + close>EMA200 + 4h ema gate + volume + patient SMA50 exit).
        Stacking degraded vs less-filtered v0.4.0 baseline. Confirms+extends
        v0.4.0 r16 filter-stack-overload finding: optimal filter stack does
        NOT push past intrinsic paradigm cap; **the 0.40 momentum ceiling is
        not a tuning artifact — it's structural**.
    - title: Single-knob sizing walks produce Pareto move not improvement (3rd instance)
      detail: |
        BNBSized r17 (linear vs 25/RSI formula), v0.4.0 r17-r20 (vol-target
        ladder), RegimeAdaptive r27 (regime multiplier 1.5x/0.5x → 2x/0.25x).
        Three independent instances across two versions, same outcome:
        sharpe drops slightly OR moves laterally, avg_position rises, DD
        widens. **Sizing-knob single-direction walk = Pareto move, never
        Pareto improvement.** Stable cross-version meta-finding.

  # Cross-version NARROWS — v0.4.1 corrects/limits prior universal claims
  cross_version_narrows:
    - title: Volume filter is paradigm-specific (narrows v0.2.0 universal claim)
      detail: |
        v0.2.0 declared "volume filter universal when stack is light".
        v0.4.1 r24 evidence: volume filter HURTS momentum (continuations
        don't spike volume; bull sharpe 0.05 → 0.46 when removed) and
        HELPS capitulation/MR (CrashRebound r10 confirmed lift). **Narrows
        v0.2.0 finding from universal to family-specific: volume helps
        capitulation/MR; volume hurts continuation/momentum.**
    - title: Patient-exit (SMA75-100) is breakout-family-specific (narrows v0.4.0)
      detail: |
        v0.4.0 r13 finding "regime-mix prefers SMA75-100 patient exit" was
        on a breakout strategy. v0.4.1 r14 tested transfer to CrashRebound
        (counter-trend MR family): SMA50→SMA100 backfired catastrophically
        (winter 0.06→-0.22, recovery 0.19→0.01). Agent: "Patient exit lets
        crash bounces ride past peak into reversion — drawdown-rebounds
        revert quickly." **Narrows v0.4.0 finding from "regime-mix prefers
        patience" to "breakout-family prefers patience; counter-trend MR
        family prefers tight exits".**

behavioral_observations:
  - title: Voluntary multi-strategy convergence stop
    note: |
      All 3 strategies marked "FINAL" voluntarily in r29 notes. Different
      mechanism from v0.4.0's Pareto-end stop (one strategy degenerating
      into single-metric noise) — here the agent recognized the joint
      3-strategy lineup had stabilized at proven baselines after r28's
      composition experiment failed (CrashRebound robust → -0.083) and
      reverted. Most "researcher-like" stop in the project so far:
      experiment failed → revert → declare convergence on multi-strategy
      portfolio rather than continue squeezing.
  - title: Bookkeeping drift from v0.4.0 RESOLVED
    note: |
      v0.4.0 retrospective flagged "implicit kill via subsequent create note"
      pattern (only 1 explicit kill row for 4 actual kills). v0.4.1 shows
      9 explicit kill rows for 9 actual kills — agent followed the implied
      protocol consistently across the entire run. No analysis.ipynb fix
      needed; behavior change alone resolved the issue. Suggests the
      retrospective itself functions as durable program guidance even
      though not in program.md.
  - title: Pareto-frontier-aware decision-making throughout
    note: |
      pareto_dominated_by gate fired on all 3 FINAL strategies, with the
      dominators being early-run strategies (BNBMeanRevertSharp r0,
      BNBSizedConviction r9). Agent did not treat Pareto domination as
      "automatic kill" — it kept evolving the dominated strategies because
      they explored different paradigms (drawdown-rebound, paradigm-conditional)
      with potential for future Pareto extension. Demonstrates the gate
      working as informational rather than imperative. The agent treated
      Pareto domination at the same level as profit_floor failure: a
      gate state to acknowledge in the note, not a hard kill criterion.
  - title: Ablation-fork pattern continues
    note: |
      r6 fork (BNBMeanRevertSharp → BNBMeanRevertMulti) was ablation-style:
      drop the pair_basket constraint to test "is BNB MR pair-specific or
      generic?" — answer arrived in 1 round (BNB +0.15 / others ≤+0.02),
      child killed r7. Cleaner than v0.4.0's fork (which was also ablation
      but tested the same strategy across more rounds). Pattern named in
      v0.4.0 retro is now stable across 2 versions. r9 BNBSizedConviction
      was also conceptually a fork (note says "fork of BNB") but logged
      as create — minor bookkeeping inconsistency, doesn't affect findings.
  - title: Zero classic Goodhart attempts (5th run in a row)
    note: |
      No exit_profit_only toggles, no ROI clipping, no Sharpe-up-while-
      profit-down without explicit Pareto-walk justification.
      Multi-objective gates likely had a structural deterrent effect:
      pareto_dominated_by automatically detects "sizing-walk Sharpe inflation"
      patterns by reading historical results.tsv rows. r17 BNBSized linear
      formula attempt (Pareto move, not Goodhart but Pareto-tracked) was
      auto-flagged as dominated by r9 baseline.

limitations:
  - title: profit_floor failed on all 3 FINAL strategies
    detail: |
      Threshold 20% per timerange — none of the 3 FINAL strategies clear
      this for winter_2022 (best is RegimeAdaptiveBNB +3.71%). This is
      partly inherent to "long-only spot in a bear market" (BaH winter
      was -53% to -85% across pairs), partly a calibration question
      (20% / year on a 5-year regime is high for low-position-size
      strategies). The gate did its job (informed agent of the floor)
      but no strategy achieved it. Recommend v0.5.0 either lowering
      threshold or making it timerange-conditional (e.g., winter floor
      could be ≥0%, recovery floor ≥10%).
  - title: All 3 FINAL strategies Pareto-dominated by early-run strategies
    detail: |
      Pareto frontier within the run is just {BNBMeanRevertSharp r0,
      BNBSizedConviction r9} — both BNB-only RSI MR strategies, both
      KILLED during the run (r10 + r22 respectively, mechanisms preserved
      in successors). The 22 subsequent rounds of evolution + creation
      did not produce a strategy strictly dominating these two on
      (robust_sharpe, max_dd). Suggests "early local optimum lock"
      pattern: a strong baseline + a single sizing ablation can
      saturate the regime-robust frontier before complexity arrives.
      v0.5.0 might explicitly carry forward Pareto-frontier strategies
      across rounds (don't kill them just to free slots) and let agent
      evolve next to them rather than away from them.
  - title: robust_sharpe absolute values are tiny (~0.05-0.10)
    detail: |
      Successful but not impressive in trading-deployment terms. Robust
      sharpe is min-of-4-regimes, dominated by winter; long-only spot
      crypto in 2022 has structurally low alpha. **The headline isn't
      a Sharpe number — it's "first multi-strategy lineup with robust
      sharpe > 0 across all regimes simultaneously"**. Compare to BaH
      winter sharpe which is consistently negative (-0.7 to -1.5) for
      every pair — the strategies' near-zero positive winter sharpe is
      what the gate forces them to defend.
  - title: Strategies underperform BaH on full_5y
    detail: |
      CrashRebound +55.7% / PerPairMR +35.8% / RegimeAdaptive +16.4%
      vs BaH +1740% to +3632% over the same 5 years (5-pair equal-weight
      ~+2188%). The strategies' niche is winter (where BaH is -50% to -85%
      and strategies are slightly positive) — they trade absolute return
      for drawdown protection. Useful framing for downstream readers:
      v0.4.1 strategies are not standalone trading strategies, they're
      "drawdown-protected partial-exposure" research artifacts. Real-world
      use would be as winter-hedge allocation alongside BaH, not replacement.
  - title: Long-only spot is the binding affordance constraint
    detail: |
      All v0.4.1 strategies long-only spot — winter alpha extraction is
      structurally capped because best behavior in a bear market is "don't
      trade". Adding shorting (perp futures) would convert winter from
      "minimize loss" to "extract alpha from negative drift" and is the
      single most-impactful affordance unlock available. Out of v0.4.1 scope
      but the obvious v0.5.0+ direction.
  - title: pair_basket scope still narrow (1-3 pairs in FINAL strategies)
    detail: |
      CrashRebound runs 3 pairs (alts+BNB), PerPairMR runs full 5,
      RegimeAdaptive runs only BNB. None of the FINAL strategies expanded
      basket to test cross-asset diversification meaningfully. CrashRebound
      r18 attempted basket expansion to 5-pair, surfaced clean Pareto move
      (full sharpe +0.40 BUT winter dropped 0.085→0.013), reverted r19.
      The robust_sharpe metric structurally penalizes basket expansion when
      added pairs aren't winter-positive — basket selection becomes a
      regime-stability optimization rather than diversification-for-return.

recommended_v0_5_0_directions:
  # v0.4.0 retrospective listed candidates A-F. Re-evaluating for v0.5.0:
  done_in_v0_4_1:
    - B  # multi-objective oracle (profit_floor + min_position_size + pareto_dominated_by) — implemented
    - C  # external benchmark (BaH per timerange) — implemented
    - F  # bookkeeping (kill events explicit) — resolved by behavior change, not code change

  remaining_from_v0_4_0:
    - id: A
      title: External orchestrator for context-resetting
      priority_now: medium
      note: |
        v0.4.1 ran 30 rounds vs v0.4.0's 20 — context less binding when
        per-round events stay manageable (one strategy may emit 4 timerange
        blocks but each is compact). Per-round info density still grows
        though; orchestrator helps if v0.5.0 adds more strategies / pairs.
    - id: D
      title: Cross-asset-class generalization
      priority_now: low
      note: |
        Major engineering effort, scope creep beyond "crypto quant prototype".
        Defer indefinitely unless project pivot.
    - id: E
      title: Per-strategy timeframe selection
      priority_now: medium
      note: |
        Modest improvement; aligns with "let strategies declare their full
        configuration" trend that pair_basket and test_timeranges started.

  new_v0_5_0_candidates:
    - id: G
      title: Sub-1h base timeframe (15m or 5m)
      priority_now: high
      note: |
        Capitulation-rebound, breakout-pullback, MR entry-timing all benefit
        from finer base TF. Cost: data 4-12x, backtest 3-5x. Plausibly
        biggest single robust_sharpe lift available without breaking spot
        constraint. Independent of all other proposed changes.
    - id: H
      title: Hyperopt inner loop
      priority_now: high
      note: |
        Hand off continuous-parameter search (RSI threshold, BB width, etc.)
        to FreqTrade's hyperopt; LLM agent constrains the space. Multiplies
        effective search depth. Risk: introduces new Goodhart surface —
        needs careful OOS split design and oracle-gate enforcement.
    - id: I
      title: Shorting via perp futures
      priority_now: high (transformative)
      note: |
        BIGGEST single unlock available. Converts winter from "sit out"
        to "extract alpha from negative drift". Plausible 2-5x robust_sharpe
        lift just from being able to act in bears. Cost: trading_mode change,
        funding-rate data, strategy short-side logic, oracle adjustment for
        funding cost. Not "one variable per version" if combined with
        other changes — likely deserves its own version.
    - id: J
      title: Carry forward Pareto-frontier strategies across rounds
      priority_now: medium
      note: |
        v0.4.1 limitation: BNBSized r9 (Pareto-frontier) was killed at r22
        for slot freeing. Future version could enforce "Pareto-frontier
        strategies are sticky — don't kill, set aside in archive slot".
        Lets agent evolve next to the frontier rather than reset to zero
        each time a new paradigm starts.

  recommended_ordering: |
    G (sub-hour) + H (hyperopt) bundled → v0.5.0 (independent affordances,
    each ~1.5-2x robust_sharpe, both within long-only spot framework).
    I (shorting) standalone → v0.6.0 (transformative single-variable change,
    cleanest attribution if isolated). E (per-strategy TF) folds naturally
    into G. A (orchestrator), J (Pareto carry-forward), F (further
    bookkeeping) deferred to as-needed. D (cross-asset) deferred indefinitely.
