version: 0.4.1
title: pair_basket + multi-timerange + BaH + multi-objective gates — first regime-robust portfolio
date_started: 2026-05-08
date_completed: 2026-05-08
branch: autoresearch/may7-2026
git_tag: v0.4.1
peak_commit: ebe3254  # round 29 FINAL state — agent self-stopped with all 3 strategies marked "FINAL"
robust_peak_alive_commit: f53740b  # round 26 — RegimeAdaptiveBNB compose-sizing peak (robust 0.0967), highest among alive
robust_peak_ever_commit: 021e120   # round 9 — BNBSizedConviction (robust 0.0980), Pareto-frontier reference, killed r22

intervention:
  summary: |
    Four affordances bundled on top of v0.4.0:
    (1) Strategy-declared portfolio (`pair_basket` class attr): strategies pick
        which subset of the 5-pair whitelist to trade rather than being forced
        through all 5. Lets BNB-skewed paradigms cleanly isolate their alpha.
    (2) Multi-timerange testing (`test_timeranges` class attr): each strategy
        backtested across multiple regime segments per round (default
        bull_2021 / winter_2022 / recovery_23-25 / full_5y). Headline metric is
        `robust_sharpe = min(sharpe across declared timeranges)`.
    (3) Buy-and-hold benchmark per timerange: `run.py` computes equal-weight
        portfolio BaH metrics for each strategy's basket and emits them
        alongside strategy results. Permanent context anchor.
    (4) Multi-objective gates flanking robust_sharpe:
        - `profit_floor` (≥ 20% per timerange)
        - `min_position_size` (avg ≥ 5% wallet)
        - `pareto_dominated_by` (auto-detect dominance against any prior
          results.tsv row with sharpe ≥ AND max_dd ≥)
        Gates emitted in SUMMARY block; agent decides keep/kill informed by
        gate status, not bound by it.
  vs_v0_4_0: |
    v0.4.0 surfaced "Sharpe-as-single-oracle has a degeneracy boundary" via
    the vol_target Pareto walk (Sharpe 1.122 → 1.339, profit 232% → 25%).
    v0.4.1's multi-objective gates + robust_sharpe are direct structural
    response: tightening one knob can no longer climb the headline metric
    without simultaneously failing flanking gates AND being Pareto-dominated
    by historical reference.

